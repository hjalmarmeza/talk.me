<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dialecta - Traductor en Tiempo Real</title>
    <!-- Favicon e Íconos PWA/Apple -->
    <link rel="icon" type="image/png" href="icon.png">
    <link rel="apple-touch-icon" href="apple-touch-icon.png">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0d1117">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Dialecta">

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;600;800&display=swap"
        rel="stylesheet">
    <!-- Íconos (Phosphor Icons - muy premium) -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link rel="stylesheet" href="styles.css">
</head>

<body>

    <!-- Fondo Animado -->
    <div class="ambient-background">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
    </div>

    <!-- UI Principal -->
    <main class="app-container">

        <!-- Cabecera / Configurador de Idiomas -->
        <header class="glass-header">
            <!-- Título Principal y App Lang global -->
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                <div class="logo-area" style="margin-bottom: 0;">
                    <i class="ph-fill ph-waves"></i>
                    <h1>Dialecta</h1>
                </div>

                <!-- Opciones de lenguaje de LA APP (Visual) -->
                <div style="display: flex; align-items: center; gap: 8px;">
                    <div class="app-lang-selector"
                        style="display: flex; align-items: center; gap: 8px; font-size: 13px;">
                        <i class="ph ph-globe" style="color: var(--accent-secondary); font-size: 20px;"></i>
                        <select id="app-lang-select" class="glass-select"
                            style="padding: 4px 8px; font-size: 13px; height: auto;">
                            <option value="es">ES</option>
                            <option value="en">EN</option>
                            <option value="fr">FR</option>
                        </select>
                    </div>

                    <button id="clear-local-btn" class="glass-btn-small"
                        style="background: rgba(255,255,255,0.05); padding: 4px 8px;"
                        title="Limpiar mis mensajes de pantalla">
                        <i class="ph ph-trash" style="font-size: 16px;"></i>
                    </button>
                </div>
            </div>

            <div id="room-info-section" class="room-info mode-hidden"
                style="flex-wrap: wrap; gap: 10px; padding: 12px 16px;">
                <div class="room-badge" style="flex: 1; min-width: 110px;">
                    <span class="status-dot"></span>
                    <span data-i18n="roomLabel">Sala:</span> <strong id="room-id-display">creando...</strong>
                </div>

                <div style="display: flex; gap: 8px; flex: 2; min-width: 200px; max-width: 100%;">
                    <input type="text" id="username" class="glass-input" placeholder="Tu Nombre: Ej. Juan"
                        data-i18n-placeholder="namePlaceholder"
                        style="padding: 6px 12px; height: 34px; font-size: 13px; flex: 1; margin: 0; min-width: 0;">

                    <button id="invite-btn" class="glass-btn-small"
                        style="height: 34px; padding: 0 12px; flex-shrink: 0; background: linear-gradient(135deg, rgba(99, 102, 241, 0.4), rgba(236, 72, 153, 0.4));">
                        <i class="ph ph-share-network"></i> <span data-i18n="inviteBtn">Invitar</span>
                    </button>
                </div>
            </div>

        </header>

        <!-- Historial de Conversación -->
        <section class="chat-history" id="chat-history">

            <div class="system-message">
                <i class="ph ph-shield-check"></i>
                <span data-i18n="safeRoomDesc">Sala segura. Elige tu idioma y mantén presionado el botón central para
                    hablar.</span>
            </div>

        </section>

        <!-- Campo Discreto Manual (Floating Action Input) -->
        <div class="manual-input-wrapper">
            <form id="manual-input-form" class="manual-input-form">
                <input type="text" id="manual-text-input" class="glass-input manual-input-field"
                    placeholder="Escribe aquí..." data-i18n-placeholder="typeToTranslate" autocomplete="off">
                <button type="submit" id="manual-send-btn" class="glass-btn-small manual-send-btn">
                    <i class="ph-fill ph-paper-plane-tilt"></i>
                </button>
            </form>
        </div>

        <!-- Controles Inferiores (Walkie-Talkie) -->
        <footer class="ptt-controls">

            <div class="status-indicator" id="status-text">Listo para transmitir</div>

            <div class="bottom-action-panel">
                <div class="travel-selectors modern-selectors">
                    <div class="select-wrapper">
                        <span class="flag-icon" id="my-flag">🇪🇸</span>
                        <select id="my-lang" class="glass-select bold-select">
                            <option value="es-ES" data-i18n="langES" selected>Español</option>
                            <option value="en-US" data-i18n="langEN">English (US)</option>
                            <option value="fr-FR" data-i18n="langFR">Français</option>
                            <option value="de-DE" data-i18n="langDE">Deutsch</option>
                            <option value="it-IT" data-i18n="langIT">Italiano</option>
                            <option value="pt-BR" data-i18n="langPT">Português (BR)</option>
                            <option value="ja-JP" data-i18n="langJA">日本語</option>
                            <option value="zh-CN" data-i18n="langZH">中文</option>
                        </select>
                    </div>

                    <button id="swap-lang-btn" class="swap-btn" title="Intercambiar Idiomas">
                        <i class="ph ph-arrows-left-right"></i>
                    </button>

                    <div class="select-wrapper">
                        <span class="flag-icon" id="target-flag">🇺🇸</span>
                        <select id="target-lang" class="glass-select bold-select">
                            <option value="en-US" data-i18n="langEN" selected>English (US)</option>
                            <option value="es-ES" data-i18n="langES">Español</option>
                            <option value="fr-FR" data-i18n="langFR">Français</option>
                            <option value="de-DE" data-i18n="langDE">Deutsch</option>
                            <option value="it-IT" data-i18n="langIT">Italiano</option>
                            <option value="pt-BR" data-i18n="langPT">Português (BR)</option>
                            <option value="ja-JP" data-i18n="langJA">日本語</option>
                            <option value="zh-CN" data-i18n="langZH">中文</option>
                        </select>
                    </div>
                </div>

                <div class="ptt-wrapper">
                    <div class="ripple-ring rings-1"></div>
                    <div class="ripple-ring rings-2"></div>

                    <button id="ptt-button" class="ptt-btn" aria-label="Mantener presionado para hablar">
                        <i class="ph-fill ph-microphone"></i>
                    </button>
                </div>
            </div>

            <p class="instruction" data-i18n="tapToTalk">Toca para hablar</p>

            <div class="pill-tabs-container">
                <button id="tab-solo" class="pill-tab active"><i class="ph ph-user"></i> <span
                        style="margin-left: 6px;">En Persona</span></button>
                <div class="pill-divider"></div>
                <button id="tab-room" class="pill-tab"><i class="ph-fill ph-users-three"></i> <span
                        style="margin-left: 6px;">Sala Grupal</span></button>
            </div>
        </footer>

        <!-- Modal de Compartir -->
        <div id="share-modal" class="share-modal hidden">
            <div class="share-content">
                <div class="share-header">
                    <h3 data-i18n="inviteTitle">Invitar a un contacto</h3>
                    <button id="close-share" class="close-btn"><i class="ph ph-x"></i></button>
                </div>
                <p class="share-desc" data-i18n="inviteDesc">¿Por dónde quieres enviar la invitación a la sala?</p>
                <div class="share-options">
                    <button class="share-btn whatsapp" id="share-wa">
                        <i class="ph-fill ph-whatsapp-logo"></i> WhatsApp
                    </button>
                    <button class="share-btn telegram" id="share-tg">
                        <i class="ph-fill ph-telegram-logo"></i> Telegram
                    </button>
                    <button class="share-btn email" id="share-email">
                        <i class="ph-fill ph-envelope"></i> Correo
                    </button>
                    <button class="share-btn copy" id="share-copy">
                        <i class="ph-fill ph-copy"></i> <span data-i18n="copyLink">Copiar Link</span>
                    </button>
                </div>
            </div>
        </div>

    </main>

    <!-- Script Principal -->
    <script type="module" src="app.js"></script>
</body>

</html>
```
